<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}Kieran Maynard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ site.baseurl }}/styles.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
</head>
<body>

    <nav class="site-nav">
      <a href="{% if page.lang == 'ja' %}/ja/{% else %}/{% endif %}" class="nav-name">Kieran Maynard</a>
      <div class="nav-links">
        {% if page.lang == 'ja' %}
        <a href="/ja/work.html">実績</a>
        <a href="/ja/#publications">出版物</a>
        <a href="/ja/translation.html">翻訳</a>
        <a href="mailto:kieranmaynard@gmail.com">お問い合わせ</a>
        {% else %}
        <a href="/work.html">Work</a>
        <a href="/#publications">Publications</a>
        <a href="/translation.html">Translation</a>
        <a href="mailto:kieranmaynard@gmail.com">Contact</a>
        {% endif %}
        {% if page.lang_url %}
        <span class="lang-divider">|</span>
        {% if page.lang == 'ja' %}
        <a href="{{ page.lang_url }}" class="lang-switch">EN</a>
        {% else %}
        <a href="{{ page.lang_url }}" class="lang-switch">日本語</a>
        {% endif %}
        {% endif %}
      </div>
    </nav>

    <div class="container">
      {{ content }}
    </div>

    <footer>Built with <a href="https://claude.ai/code" style="color: inherit;">Claude Code</a>.</footer>

    {% if site.chatbot_worker_url %}
    <script>window.CHATBOT_WORKER_URL = '{{ site.chatbot_worker_url }}';</script>
    <script src="{{ site.baseurl }}/chatbot.js" defer></script>
    {% endif %}

</body>
</html>
