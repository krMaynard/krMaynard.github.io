name = "kieranmaynard-chatbot"
main = "worker.js"
compatibility_date = "2024-09-23"

# KV namespace for rate limiting.
# After running `wrangler kv namespace create CHATBOT_KV`, paste the returned id below.
[[kv_namespaces]]
binding = "CHATBOT_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Secrets — set these via the CLI, never commit them:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put GITHUB_RESUME_REPO   (e.g. "krmaynard/private-resume")
#   wrangler secret put GITHUB_RESUME_PATH   (e.g. "resume.txt")
