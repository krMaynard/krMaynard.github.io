<style>
.md-viewer-desc {
  color: var(--text-muted);
  margin: 0.4rem 0 1.4rem;
  font-size: 0.95rem;

.md-toolbar {
  display: flex;
  align-items: center;
  gap: 0.2rem;
  padding: 0.45rem 0.65rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  flex-wrap: wrap;
  row-gap: 0.3rem;
}

.md-toolbar-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2rem;
  height: 1.9rem;
  padding: 0 0.45rem;
  border: 1px solid transparent;
  border-radius: 5px;
  background: none;
  color: var(--text);
  font-size: 0.82rem;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, border-color 0.12s;

.md-toolbar-btn:hover {
  background: var(--bg-subtle);
  border-color: var(--border);
}

  margin-left: auto;

  display: flex;
  gap: 0.35rem;

}

  border: 1px solid var(--border);

  color: var(--text-muted);

  font-family: inherit;

  min-height: 400px;
  border: 1px solid var(--border);
  border-top: none;

  overflow: hidden;
  background: var(--bg-elevated);
}

.md-pane {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 0;
}

.md-pane-label {
  padding: 0.35rem 0.75rem;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-faint);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: var(--bg-subtle);
  user-select: none;
  flex-shrink: 0;
}

#md-input {
  flex: 1;
  width: 100%;
  padding: 1rem;
  border: none;
  background: var(--bg-elevated);
  color: var(--text);
  font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;

  outline: none;
  box-sizing: border-box;

  width: 5px;
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.15s;
}
.md-divider:hover,
.md-divider.md-dragging {
  background: var(--brand);
}

.md-preview-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 1.1rem 1.4rem;
}

.md-preview-content {

  line-height: 1.75;
  font-size: 0.925rem;
}
.md-preview-content > *:first-child { margin-top: 0; }
.md-preview-content h1,
.md-preview-content h2,
.md-preview-content h3,
.md-preview-content h4 {
  color: var(--text-strong);
  margin: 1.4em 0 0.45em;
  line-height: 1.3;
  font-weight: 600;
}
.md-preview-content h1 { font-size: 1.6em; }
.md-preview-content h2 {
  font-size: 1.25em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.3em;
}
.md-preview-content h3 { font-size: 1.07em; }
.md-preview-content p { margin: 0.75em 0; }

.md-preview-content ol { margin: 0.75em 0; padding-left: 1.5em; }
.md-preview-content li { margin: 0.3em 0; }

  background: var(--bg-subtle);
  border: 1px solid var(--border);

  font-size: 0.87em;
}

  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.9em 1em;
  overflow-x: auto;
  margin: 0.9em 0;
}

  background: none;
  border: none;
  padding: 0;
  font-size: 0.875em;
}

  margin: 0.9em 0;
  padding: 0.5em 1em;
  border-left: 3px solid var(--brand);
  background: var(--brand-bg);
  border-radius: 0 4px 4px 0;
  color: var(--text-muted);
}

  border-collapse: collapse;
  width: 100%;
  margin: 0.9em 0;
  font-size: 0.9em;
}

.md-preview-content td {
  border: 1px solid var(--border);
  padding: 0.45em 0.7em;
  text-align: left;
}
.md-preview-content th {
  background: var(--bg-subtle);
  font-weight: 600;
}
.md-preview-content tr:nth-child(even) td { background: var(--bg-subtle); }
.md-preview-content a { color: var(--brand); text-decoration: none; }
.md-preview-content a:hover { text-decoration: underline; }
.md-preview-content img { max-width: 100%; border-radius: 4px; }
.md-preview-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.4em 0;
}

@media (max-width: 640px) {
  .md-panes {
    flex-direction: column;
    height: auto;
    min-height: 0;
  }
  .md-pane { min-height: 280px; }
  .md-divider { width: 100%; height: 5px; cursor: row-resize; }
  .md-toolbar-stats { display: none; }
}
</style>

<span class="section-label">工具</span>
<h1>Markdown实时预览</h1>
<p class="md-viewer-desc">在左侧输入Markdown，右侧实时显示预览效果。完全在浏览器中运行，不发送任何数据。</p>

<div class="md-toolbar" id="md-toolbar">
  <button class="md-toolbar-btn" data-wrap="**" title="粗体"><b>B</b></button>
  <button class="md-toolbar-btn" data-wrap="_" title="斜体"><i>I</i></button>
  <button class="md-toolbar-btn" data-wrap="~~" title="删除线"><s>S</s></button>
  <div class="md-toolbar-sep"></div>
  <button class="md-toolbar-btn" data-prefix="# " title="一级标题">H1</button>
  <button class="md-toolbar-btn" data-prefix="## " title="二级标题">H2</button>
  <button class="md-toolbar-btn" data-prefix="### " title="三级标题">H3</button>
  <div class="md-toolbar-sep"></div>
  <button class="md-toolbar-btn" data-wrap="`" title="行内代码"><code style="font-size:0.85em">c</code></button>
  <button class="md-toolbar-btn" data-block="```\n" data-block-end="\n```" title="代码块">```</button>
  <button class="md-toolbar-btn" data-prefix="> " title="引用">❝</button>
  <div class="md-toolbar-sep"></div>
  <button class="md-toolbar-btn" data-prefix="- " title="无序列表">• 列表</button>
  <button class="md-toolbar-btn" data-prefix="1. " title="有序列表">1. 列表</button>
  <button class="md-toolbar-btn" data-insert="[文字](链接)" title="链接">链接</button>
  <button class="md-toolbar-btn" data-insert="---" title="水平线">—</button>
  <span class="md-toolbar-stats" id="md-stats">0词 · 0字</span>
  <div class="md-toolbar-actions">
    <button class="md-action-btn" id="md-copy-html">复制HTML</button>
    <button class="md-action-btn" id="md-copy-md">复制MD</button>
    <button class="md-action-btn" id="md-clear">清空</button>
  </div>
</div>

<div class="md-panes" id="md-panes">
  <div class="md-pane" id="md-input-pane">
    <div class="md-pane-label">Markdown</div>
    <textarea id="md-input" spellcheck="false" placeholder="在此输入或粘贴Markdown…"></textarea>
  </div>
  <div class="md-divider" id="md-divider" title="拖动调整大小"></div>
  <div class="md-pane" id="md-output-pane">
    <div class="md-pane-label">预览</div>
    <div class="md-preview-scroll">
      <div id="md-preview" class="md-preview-content"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
(function () {
  var input   = document.getElementById('md-input');
  var preview = document.getElementById('md-preview');
  var stats   = document.getElementById('md-stats');
  var divider = document.getElementById('md-divider');
  var panes   = document.getElementById('md-panes');
  var leftPane  = document.getElementById('md-input-pane');
  var rightPane = document.getElementById('md-output-pane');

  var SAMPLE = [
    '# Markdown实时预览',
    '',
    '输入**粗体**、_斜体_或`行内代码`——预览即时更新。',
    '',
    '## 功能',
    '',
    '- 实时预览',
    '- 常用格式工具栏',
    '- 复制渲染后的HTML或原始Markdown',
    '- 可调整大小的分屏',
    '- 深色模式支持',
    '',
    '## 代码示例',
    '',
    '```javascript',
    'function greet(name) {',
    '  return `你好，${name}！`;',
    '}',
    '```',
    '',
    '## 表格',
    '',
    '| 语言 | 语系 | 文字 |',
    '|------|------|------|',
    '| 日语 | 日本语系 | 假名·汉字 |',
    '| 汉语 | 汉藏语系 | 汉字 |',
    '| 韩语 | 朝鲜语系 | 谚文 |',
    '',
    '> 完全在浏览器中运行。不发送任何数据。',
  ].join('\n');

  input.value = SAMPLE;

  marked.use({ breaks: true, gfm: true });

  function render() {
    preview.innerHTML = DOMPurify.sanitize(marked.parse(input.value));
    var text  = input.value;
    var cjk  = (text.match(/[⺀-⻿　-鿿豈-﫿㐀-䶿]/g) || []).length;
    var rest  = text.replace(/[⺀-⻿　-鿿豈-﫿㐀-䶿]/g, '').trim();
    var words = cjk + (rest ? rest.split(/\s+/).filter(Boolean).length : 0);
    var chars = text.length;
    stats.textContent = words + '词 · ' + chars + '字';
  }

  var debouncedRender = (function () {
    var t;
    return function () { clearTimeout(t); t = setTimeout(render, 150); };
  }());
  input.addEventListener('input', debouncedRender);
  render();

  document.getElementById('md-toolbar').addEventListener('click', function (e) {
    var btn = e.target.closest('[data-wrap],[data-prefix],[data-block],[data-insert]');
    if (!btn || btn.classList.contains('md-action-btn')) return;

    var s   = input.selectionStart;
    var end = input.selectionEnd;
    var sel = input.value.slice(s, end);
    var before = input.value.slice(0, s);
    var after  = input.value.slice(end);
    var ns, ne;

    if (btn.dataset.wrap !== undefined) {
      var w = btn.dataset.wrap;
      input.value = before + w + sel + w + after;
      ns = s + w.length; ne = ns + sel.length;
    } else if (btn.dataset.prefix !== undefined) {
      var p = btn.dataset.prefix;
      var replacement = sel ? sel.split('\n').map(function (l) { return p + l; }).join('\n') : p;
      input.value = before + replacement + after;
      ns = s + p.length; ne = s + replacement.length;
    } else if (btn.dataset.block !== undefined) {
      var bs = btn.dataset.block, be = btn.dataset.blockEnd;
      input.value = before + bs + sel + be + after;
      ns = s + bs.length; ne = ns + sel.length;
    } else if (btn.dataset.insert !== undefined) {
      var ins = btn.dataset.insert;
      input.value = before + ins + after;
      ns = s; ne = s + ins.length;
    }

    input.focus();
    input.setSelectionRange(ns, ne);
    render();
  });

  function flashBtn(btn, msg, original) {
    btn.textContent = msg;
    btn.classList.add('md-copied');
    setTimeout(function () {
      btn.textContent = original;
      btn.classList.remove('md-copied');
    }, 1500);
  }

  document.getElementById('md-copy-html').addEventListener('click', function () {
    navigator.clipboard.writeText(preview.innerHTML).then(function () {
      flashBtn(document.getElementById('md-copy-html'), '已复制！', '复制HTML');
    });
  });

  document.getElementById('md-copy-md').addEventListener('click', function () {
    navigator.clipboard.writeText(input.value).then(function () {
      flashBtn(document.getElementById('md-copy-md'), '已复制！', '复制MD');
    });
  });

  document.getElementById('md-clear').addEventListener('click', function () {
    if (!input.value || confirm('清空编辑器？')) {
      input.value = '';
      render();
      input.focus();
    }
  });

  var dragging = false, startX, startY, startW;

  function isVertical() { return window.innerWidth <= 640; }

  divider.addEventListener('mousedown', function (e) {
    var vert = isVertical();
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startW = vert ? leftPane.offsetHeight : leftPane.offsetWidth;
    divider.classList.add('md-dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = vert ? 'row-resize' : 'col-resize';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    if (isVertical()) {
      var totalH = panes.offsetHeight - divider.offsetHeight;
      var newH   = Math.max(150, Math.min(totalH - 150, startW + (e.clientY - startY)));
      leftPane.style.flex   = 'none';
      leftPane.style.height = newH + 'px';
      rightPane.style.flex  = '1';
    } else {
      var totalW = panes.offsetWidth - divider.offsetWidth;
      var newW   = Math.max(180, Math.min(totalW - 180, startW + (e.clientX - startX)));
      leftPane.style.flex  = 'none';
      leftPane.style.width = newW + 'px';
      rightPane.style.flex = '1';
    }
  });

  document.addEventListener('mouseup', function () {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('md-dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });

  divider.addEventListener('touchstart', function (e) {
    var touch = e.touches[0];
    var vert = isVertical();
    dragging = true;
    startX = touch.clientX;
    startY = touch.clientY;
    startW = vert ? leftPane.offsetHeight : leftPane.offsetWidth;
    divider.classList.add('md-dragging');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', function (e) {
    if (!dragging) return;
    var touch = e.touches[0];
    if (isVertical()) {
      var totalH = panes.offsetHeight - divider.offsetHeight;
      var newH   = Math.max(150, Math.min(totalH - 150, startW + (touch.clientY - startY)));
      leftPane.style.flex   = 'none';
      leftPane.style.height = newH + 'px';
      rightPane.style.flex  = '1';
    } else {
      var totalW = panes.offsetWidth - divider.offsetWidth;
      var newW   = Math.max(180, Math.min(totalW - 180, startW + (touch.clientX - startX)));
      leftPane.style.flex  = 'none';
      leftPane.style.width = newW + 'px';
      rightPane.style.flex = '1';
    }
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', function () {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('md-dragging');
  });
}());
</script>
