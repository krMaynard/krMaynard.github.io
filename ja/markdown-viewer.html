<style>
.md-viewer-desc {
  color: var(--text-muted);
  margin: 0.4rem 0 1.4rem;
  font-size: 0.95rem;
}

.md-toolbar {
  display: flex;
  align-items: center;
  gap: 0.2rem;
  padding: 0.45rem 0.65rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  flex-wrap: wrap;
  row-gap: 0.3rem;
}

.md-toolbar-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2rem;
  height: 1.9rem;
  padding: 0 0.45rem;
  border: 1px solid transparent;
  border-radius: 5px;
  background: none;
  color: var(--text);
  font-size: 0.82rem;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, border-color 0.12s;
}
.md-toolbar-btn:hover {
  background: var(--bg-subtle);
  border-color: var(--border);
}

.md-toolbar-sep {
  width: 1px;
  height: 1.4rem;
  background: var(--border);
  margin: 0 0.15rem;
  flex-shrink: 0;
}

.md-toolbar-stats {
  margin-left: auto;
  font-size: 0.78rem;
  color: var(--text-faint);
  white-space: nowrap;
}

.md-toolbar-actions {
  display: flex;
  gap: 0.35rem;
  margin-left: 0.5rem;
}

.md-action-btn {
  padding: 0.25rem 0.7rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-elevated);
  color: var(--text-muted);
  font-size: 0.78rem;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.md-action-btn:hover {
  background: var(--bg-subtle);
  color: var(--text);
}
.md-action-btn.md-copied {
  color: var(--brand);
  border-color: var(--brand);
}

.md-panes {
  display: flex;
  height: 70vh;
  min-height: 400px;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
  background: var(--bg-elevated);
}

.md-pane {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 0;
}

.md-pane-label {
  padding: 0.35rem 0.75rem;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-faint);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: var(--bg-subtle);
  user-select: none;
  flex-shrink: 0;
}

#md-input {
  flex: 1;
  width: 100%;
  padding: 1rem;
  border: none;
  background: var(--bg-elevated);
  color: var(--text);
  font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
  font-size: 0.875rem;
  line-height: 1.65;
  resize: none;
  outline: none;
  box-sizing: border-box;
}

.md-divider {
  width: 5px;
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.15s;
}
.md-divider:hover,
.md-divider.md-dragging {
  background: var(--brand);
}

.md-preview-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 1.1rem 1.4rem;
}

.md-preview-content {
  color: var(--text);
  line-height: 1.75;
  font-size: 0.925rem;
}
.md-preview-content > *:first-child { margin-top: 0; }
.md-preview-content h1,
.md-preview-content h2,
.md-preview-content h3,
.md-preview-content h4 {
  color: var(--text-strong);
  margin: 1.4em 0 0.45em;
  line-height: 1.3;
  font-weight: 600;
}
.md-preview-content h1 { font-size: 1.6em; }
.md-preview-content h2 {
  font-size: 1.25em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.3em;
}
.md-preview-content h3 { font-size: 1.07em; }
.md-preview-content p { margin: 0.75em 0; }
.md-preview-content ul,
.md-preview-content ol { margin: 0.75em 0; padding-left: 1.5em; }
.md-preview-content li { margin: 0.3em 0; }
.md-preview-content code {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0.1em 0.35em;
  font-family: ui-monospace, monospace;
  font-size: 0.87em;
}
.md-preview-content pre {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.9em 1em;
  overflow-x: auto;
  margin: 0.9em 0;
}
.md-preview-content pre code {
  background: none;
  border: none;
  padding: 0;
  font-size: 0.875em;
}
.md-preview-content blockquote {
  margin: 0.9em 0;
  padding: 0.5em 1em;
  border-left: 3px solid var(--brand);
  background: var(--brand-bg);
  border-radius: 0 4px 4px 0;
  color: var(--text-muted);
}
.md-preview-content table {
  border-collapse: collapse;
  width: 100%;
  margin: 0.9em 0;
  font-size: 0.9em;
}
.md-preview-content th,
.md-preview-content td {
  border: 1px solid var(--border);
  padding: 0.45em 0.7em;
  text-align: left;
}
.md-preview-content th {
  background: var(--bg-subtle);
  font-weight: 600;
}
.md-preview-content tr:nth-child(even) td { background: var(--bg-subtle); }
.md-preview-content a { color: var(--brand); text-decoration: none; }
.md-preview-content a:hover { text-decoration: underline; }
.md-preview-content img { max-width: 100%; border-radius: 4px; }
.md-preview-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.4em 0;
}

@media (max-width: 640px) {
  .md-panes {
    flex-direction: column;
    height: auto;
    min-height: 0;
  }
  .md-pane { min-height: 280px; }
  .md-divider { width: 100%; height: 5px; cursor: row-resize; }
  .md-toolbar-stats { display: none; }
}
</style>

<span class="section-label">ツール</span>
<h1>Markdownライブビューア</h1>
<p class="md-viewer-desc">左側にMarkdownを入力すると、右側にリアルタイムでプレビューが表示されます。すべてブラウザ内で動作し、データは外部に送信されません。</p>

<div class="md-toolbar" id="md-toolbar">
  <button class="md-toolbar-btn" data-wrap="**" title="太字"><b>B</b></button>
  <button class="md-toolbar-btn" data-wrap="_" title="斜体"><i>I</i></button>
  <button class="md-toolbar-btn" data-wrap="~~" title="取り消し線"><s>S</s></button>
  <div class="md-toolbar-sep"></div>
  <button class="md-toolbar-btn" data-prefix="# " title="見出し1">H1</button>
  <button class="md-toolbar-btn" data-prefix="## " title="見出し2">H2</button>
  <button class="md-toolbar-btn" data-prefix="### " title="見出し3">H3</button>
  <div class="md-toolbar-sep"></div>
  <button class="md-toolbar-btn" data-wrap="`" title="インラインコード"><code style="font-size:0.85em">c</code></button>
  <button class="md-toolbar-btn" data-block="```\n" data-block-end="\n```" title="コードブロック">```</button>
  <button class="md-toolbar-btn" data-prefix="> " title="引用">❝</button>
  <div class="md-toolbar-sep"></div>
  <button class="md-toolbar-btn" data-prefix="- " title="箇条書き">• リスト</button>
  <button class="md-toolbar-btn" data-prefix="1. " title="番号付きリスト">1. リスト</button>
  <button class="md-toolbar-btn" data-insert="[テキスト](URL)" title="リンク">リンク</button>
  <button class="md-toolbar-btn" data-insert="---" title="水平線">—</button>
  <span class="md-toolbar-stats" id="md-stats">0語 · 0字</span>
  <div class="md-toolbar-actions">
    <button class="md-action-btn" id="md-copy-html">HTMLをコピー</button>
    <button class="md-action-btn" id="md-copy-md">MDをコピー</button>
    <button class="md-action-btn" id="md-clear">クリア</button>
  </div>
</div>

<div class="md-panes" id="md-panes">
  <div class="md-pane" id="md-input-pane">
    <div class="md-pane-label">Markdown</div>
    <textarea id="md-input" spellcheck="false" placeholder="ここにMarkdownを入力または貼り付けてください…"></textarea>
  </div>
  <div class="md-divider" id="md-divider" title="ドラッグしてサイズ変更"></div>
  <div class="md-pane" id="md-output-pane">
    <div class="md-pane-label">プレビュー</div>
    <div class="md-preview-scroll">
      <div id="md-preview" class="md-preview-content"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
(function () {
  var input   = document.getElementById('md-input');
  var preview = document.getElementById('md-preview');
  var stats   = document.getElementById('md-stats');
  var divider = document.getElementById('md-divider');
  var panes   = document.getElementById('md-panes');
  var leftPane  = document.getElementById('md-input-pane');
  var rightPane = document.getElementById('md-output-pane');

  var SAMPLE = [
    '# Markdownライブビューア',
    '',
    '**太字**、_斜体_、`インラインコード` — 入力するとプレビューが即座に更新されます。',
    '',
    '## 機能',
    '',
    '- リアルタイムプレビュー',
    '- よく使う書式のツールバー',
    '- レンダリングされたHTMLまたはMarkdownをコピー',
    '- サイズ変更可能な分割ペイン',
    '- ダークモード対応',
    '',
    '## コード例',
    '',
    '```javascript',
    'function greet(name) {',
    '  return `こんにちは、${name}！`;',
    '}',
    '```',
    '',
    '## 表',
    '',
    '| 言語 | 語族 | 文字 |',
    '|------|------|------|',
    '| 日本語 | 日本語族 | 仮名・漢字 |',
    '| 中国語 | シナ・チベット語族 | 漢字 |',
    '| 韓国語 | 朝鮮語族 | ハングル |',
    '',
    '> すべてブラウザ内で動作します。データは外部に送信されません。',
  ].join('\n');

  input.value = SAMPLE;

  marked.use({ breaks: true, gfm: true });

  function render() {
    preview.innerHTML = marked.parse(input.value);
    var text  = input.value;
    var words = text.trim() ? text.trim().split(/\s+/).length : 0;
    var chars = text.length;
    stats.textContent = words + '語 · ' + chars + '字';
  }

  input.addEventListener('input', render);
  render();

  document.getElementById('md-toolbar').addEventListener('click', function (e) {
    var btn = e.target.closest('[data-wrap],[data-prefix],[data-block],[data-insert]');
    if (!btn || btn.classList.contains('md-action-btn')) return;

    var s   = input.selectionStart;
    var end = input.selectionEnd;
    var sel = input.value.slice(s, end);
    var before = input.value.slice(0, s);
    var after  = input.value.slice(end);
    var ns, ne;

    if (btn.dataset.wrap !== undefined) {
      var w = btn.dataset.wrap;
      input.value = before + w + sel + w + after;
      ns = s + w.length; ne = ns + sel.length;
    } else if (btn.dataset.prefix !== undefined) {
      var p = btn.dataset.prefix;
      var replacement = sel ? sel.split('\n').map(function (l) { return p + l; }).join('\n') : p;
      input.value = before + replacement + after;
      ns = s + p.length; ne = s + replacement.length;
    } else if (btn.dataset.block !== undefined) {
      var bs = btn.dataset.block, be = btn.dataset.blockEnd;
      input.value = before + bs + sel + be + after;
      ns = s + bs.length; ne = ns + sel.length;
    } else if (btn.dataset.insert !== undefined) {
      var ins = btn.dataset.insert;
      input.value = before + ins + after;
      ns = s; ne = s + ins.length;
    }

    input.focus();
    input.setSelectionRange(ns, ne);
    render();
  });

  function flashBtn(btn, msg, original) {
    btn.textContent = msg;
    btn.classList.add('md-copied');
    setTimeout(function () {
      btn.textContent = original;
      btn.classList.remove('md-copied');
    }, 1500);
  }

  document.getElementById('md-copy-html').addEventListener('click', function () {
    navigator.clipboard.writeText(preview.innerHTML).then(function () {
      flashBtn(document.getElementById('md-copy-html'), 'コピー済み！', 'HTMLをコピー');
    });
  });

  document.getElementById('md-copy-md').addEventListener('click', function () {
    navigator.clipboard.writeText(input.value).then(function () {
      flashBtn(document.getElementById('md-copy-md'), 'コピー済み！', 'MDをコピー');
    });
  });

  document.getElementById('md-clear').addEventListener('click', function () {
    if (!input.value || confirm('エディタをクリアしますか？')) {
      input.value = '';
      render();
      input.focus();
    }
  });

  var dragging = false, startX, startW;

  divider.addEventListener('mousedown', function (e) {
    dragging = true;
    startX = e.clientX;
    startW = leftPane.offsetWidth;
    divider.classList.add('md-dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    var total = panes.offsetWidth - divider.offsetWidth;
    var newW  = Math.max(180, Math.min(total - 180, startW + (e.clientX - startX)));
    leftPane.style.flex  = 'none';
    leftPane.style.width = newW + 'px';
    rightPane.style.flex = '1';
  });

  document.addEventListener('mouseup', function () {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('md-dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });
}());
</script>
