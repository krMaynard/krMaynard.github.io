name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node --check vlop-dashboard.js
      - run: npm test
      - run: npm ci
        working-directory: newsletter-worker
      - run: npm run check
        working-directory: newsletter-worker
      - run: npm test
        working-directory: newsletter-worker

  # Build with the same toolchain GitHub Pages uses (Jekyll 3.10 via the
  # github-pages gem). CI previously only lint/tested JS, so a Liquid error
  # that Jekyll 4 tolerates but Pages' Jekyll 3.10 rejects could merge and
  # silently freeze the live site at the last good deploy. This catches it on
  # the PR. Build only — deployment stays with the Pages "build and deployment"
  # workflow on master.
  pages-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
