name: Post to LinkedIn

on:
  push:
    branches: [master]
    paths:
      - blog.html
  # Hourly cron drives the staggered ja/zh/ko follow-up posts after the
  # initial English post (the script no-ops when nothing is due).
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

# Serialize runs so the push-triggered and cron-triggered jobs don't race on
# the tracking file.
concurrency:
  group: linkedin-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install PyNaCl --quiet

      - name: Post new entry to LinkedIn
        id: linkedin
        env:
          # Required
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          # LLM commentary — "gemini" (default) or "anthropic"; set the matching key
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional — set 0/false to skip the second expert fluency-review pass
          FLUENCY_REVIEW: ${{ vars.FLUENCY_REVIEW }}
          # Optional — spacing between language posts (defaults to 60 minutes)
          LINKEDIN_POST_INTERVAL_MINUTES: ${{ vars.LINKEDIN_POST_INTERVAL_MINUTES }}
          # Optional — enable these for automatic token refresh (recommended)
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # Provided automatically by GitHub Actions
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/post_to_linkedin.py

      - name: Commit updated tracking file
        if: steps.linkedin.outputs.posted == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last_linkedin_post
          git commit -m "chore: track LinkedIn post ${{ steps.linkedin.outputs.posted_entry }} (${{ steps.linkedin.outputs.posted_lang }})"
          git push origin master
