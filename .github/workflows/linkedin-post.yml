name: Post to LinkedIn

on:
  push:
    branches: [master]
    paths:
      - blog.html
  # Hourly cron drives the staggered ja/zh/ko follow-up posts after the
  # initial English post (the script no-ops when nothing is due).
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

# Serialize runs so the push-triggered and cron-triggered jobs don't race on
# the cached tracking state.
concurrency:
  group: linkedin-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    # Read-only: progress is persisted via the Actions cache, not committed to
    # the repo — master requires changes to go through a pull request.
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install PyNaCl --quiet

      # Restore which languages have already been posted for the current entry.
      # A cache miss falls back to the seeded .github/last_linkedin_post in the
      # repo. The unique run_id key never hits on restore, so restore-keys picks
      # the most recent saved state by prefix.
      - name: Restore LinkedIn post state
        uses: actions/cache/restore@v4
        with:
          path: .github/last_linkedin_post
          key: linkedin-state-${{ github.run_id }}
          restore-keys: |
            linkedin-state-

      - name: Post new entry to LinkedIn
        id: linkedin
        env:
          # Required
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          # LLM commentary — "gemini" (default) or "anthropic"; set the matching key
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional — set 0/false to skip the second expert fluency-review pass
          FLUENCY_REVIEW: ${{ vars.FLUENCY_REVIEW }}
          # Optional — spacing between language posts (defaults to 60 minutes)
          LINKEDIN_POST_INTERVAL_MINUTES: ${{ vars.LINKEDIN_POST_INTERVAL_MINUTES }}
          # Optional — enable these for automatic token refresh (recommended)
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # Provided automatically by GitHub Actions
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/post_to_linkedin.py

      # Persist the updated state for the next run. The run_id key is unique, so
      # the save always succeeds; restore above reads it back via prefix.
      - name: Save LinkedIn post state
        if: steps.linkedin.outputs.posted == 'true'
        uses: actions/cache/save@v4
        with:
          path: .github/last_linkedin_post
          key: linkedin-state-${{ github.run_id }}
