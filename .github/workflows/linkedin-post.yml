name: Post to LinkedIn

on:
  push:
    branches: [master]
    paths:
      - blog.html

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post new entry to LinkedIn
        id: linkedin
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: python scripts/post_to_linkedin.py

      - name: Commit updated tracking file
        if: steps.linkedin.outputs.posted == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last_linkedin_post
          git commit -m "chore: track LinkedIn post $(cat .github/last_linkedin_post | tr -d '\n')"
          git push origin master
