<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Presence — amenomori2 | Kieran Maynard</title>
  <meta name="description" content="Real-time Roblox online presence tracker for amenomori2 — live polling via the Roblox Presence API.">
  <meta property="og:title" content="Roblox Presence — amenomori2">
  <meta property="og:description" content="Real-time Roblox online presence tracker for amenomori2.">
  <link rel="canonical" href="https://krm.fyi/roblox-presence.html">
  <!-- Same fonts + theme as the main site -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) {
          t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <style>
    /* Demo-specific styles — uses site CSS custom properties for theme compat */
    .presence-demo {
      max-width: 640px;
      margin: 3rem auto;
    }
    .presence-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 24px var(--shadow-card);
      text-align: center;
    }
    .presence-card .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid var(--border-soft);
      margin-bottom: 1rem;
    }
    .presence-card .username {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-strong);
      margin-bottom: 0.25rem;
    }
    .presence-card .display-name {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }
    .presence-card .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
    }
    .presence-card .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    /* Presence states */
    .status--online  { background: #d4edda; color: #155724; }
    .status--online  .status-dot { background: #28a745; box-shadow: 0 0 6px #28a74588; }
    .status--ingame  { background: #cce5ff; color: #004085; }
    .status--ingame  .status-dot { background: #007bff; box-shadow: 0 0 6px #007bff88; }
    .status--studio  { background: #fff3cd; color: #856404; }
    .status--studio  .status-dot { background: #ffc107; box-shadow: 0 0 6px #ffc10788; }
    .status--offline { background: #f5f5f5; color: #666; }
    .status--offline .status-dot { background: #999; }
    [data-theme="dark"] .status--online  { background: #0d3320; color: #7eeaaa; }
    [data-theme="dark"] .status--ingame  { background: #0a2342; color: #80bdff; }
    [data-theme="dark"] .status--studio  { background: #332b10; color: #ffe69c; }
    [data-theme="dark"] .status--offline { background: #2a2f35; color: #999; }
    [data-theme="dark"] .status--offline .status-dot { background: #666; }

    .presence-card .game-info {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--text-subtle);
    }
    .presence-card .game-info a {
      color: var(--brand);
      text-decoration: none;
    }
    .presence-card .game-info a:hover { text-decoration: underline; }
    .presence-card .last-poll {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: var(--text-faint);
    }
    .presence-card .error-msg {
      color: #e74c3c;
      font-size: 0.85rem;
      margin-top: 1rem;
    }
    .presence-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-faint);
    }
    .presence-footer a { color: var(--brand); }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-name">Kieran Maynard</a>
  </nav>

  <main class="container">
    <div class="presence-demo">
      <div class="presence-card" id="presence-card">
        <img class="avatar" id="avatar" src="" alt="amenomori2 avatar" />
        <div class="username">amenomori2</div>
        <div class="display-name" id="display-name">@amenomori2</div>
        <div class="status status--offline" id="status-badge">
          <span class="status-dot"></span>
          <span id="status-text">Loading…</span>
        </div>
        <div class="game-info" id="game-info"></div>
        <div class="last-poll" id="last-poll"></div>
        <div class="error-msg" id="error-msg" style="display:none"></div>
      </div>
    </div>
    <div class="presence-footer">
      Polling the <a href="https://presence.roblox.com/docs" target="_blank" rel="noopener">Roblox Presence API</a> every 15 seconds.
    </div>
  </main>

  <script>
    (function () {
      // ── Config ──────────────────────────────────────────
      const USER_ID   = 9829738831;
      const USERNAME  = 'amenomori2';
      const POLL_MS   = 15000;  // 15 seconds

      // ── DOM refs ────────────────────────────────────────
      const el = {
        avatar:      document.getElementById('avatar'),
        displayName: document.getElementById('display-name'),
        statusBadge: document.getElementById('status-badge'),
        statusText:  document.getElementById('status-text'),
        gameInfo:    document.getElementById('game-info'),
        lastPoll:    document.getElementById('last-poll'),
        errorMsg:    document.getElementById('error-msg'),
      };

      // ── Presence type → label + CSS class ───────────────
      // 0=Offline, 1=Online (website), 2=In Game, 3=In Studio
      const PRESENCE_MAP = {
        0: { label: 'Offline', cls: 'status--offline' },
        1: { label: 'Online',  cls: 'status--online'  },
        2: { label: 'In Game', cls: 'status--ingame'  },
        3: { label: 'In Studio', cls: 'status--studio' },
      };

      function hideError()  { el.errorMsg.style.display = 'none'; }
      function showError(t) { el.errorMsg.textContent = t; el.errorMsg.style.display = ''; }

      function setStatus(presenceType, lastLocation, placeId, universeId) {
        const info = PRESENCE_MAP[presenceType] || PRESENCE_MAP[0];
        // Update badge classes
        el.statusBadge.className = 'status ' + info.cls;
        el.statusText.textContent = info.label;

        // Game info
        if (presenceType === 2 && universeId) {
          el.gameInfo.innerHTML =
            'Playing: <a href="https://www.roblox.com/games/' + universeId +
            '" target="_blank" rel="noopener">View on Roblox →</a>';
        } else if (presenceType === 1) {
          el.gameInfo.textContent = lastLocation || 'Website';
        } else if (presenceType === 3) {
          el.gameInfo.textContent = 'Roblox Studio';
        } else {
          el.gameInfo.textContent = '';
        }
      }

      async function poll() {
        hideError();
        try {
          // Fetch presence
          const presRes = await fetch('https://presence.roblox.com/v1/presence/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userIds: [USER_ID] }),
          });
          if (!presRes.ok) throw new Error('Presence API returned ' + presRes.status);
          const presData = await presRes.json();
          const p = presData.userPresences && presData.userPresences[0];
          if (!p) { showError('No presence data returned'); return; }

          setStatus(p.userPresenceType, p.lastLocation, p.placeId, p.universeId);

          // Fetch avatar thumbnail (once, or on refresh)
          if (!el.avatar.src || el.avatar.src === window.location.href) {
            const thumbRes = await fetch(
              'https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=' +
              USER_ID + '&size=150x150&format=Png'
            );
            if (thumbRes.ok) {
              const thumbData = await thumbRes.json();
              const img = thumbData.data && thumbData.data[0];
              if (img && img.imageUrl) el.avatar.src = img.imageUrl;
            }
          }

          // Fetch display name (once)
          if (el.displayName.textContent === '@' + USERNAME) {
            try {
              const userRes = await fetch('https://users.roblox.com/v1/users/' + USER_ID);
              if (userRes.ok) {
                const userData = await userRes.json();
                el.displayName.textContent =
                  (userData.displayName && userData.displayName !== userData.name)
                    ? userData.displayName + ' (@' + userData.name + ')'
                    : '@' + userData.name;
              }
            } catch (_) { /* non-critical */ }
          }

          // Timestamp
          el.lastPoll.textContent = 'Last checked: ' + new Date().toLocaleTimeString();

        } catch (err) {
          showError('Failed to reach Roblox API: ' + err.message);
        }
      }

      // Initial load + poll loop
      poll();
      setInterval(poll, POLL_MS);
    })();
  </script>
</body>
</html>
