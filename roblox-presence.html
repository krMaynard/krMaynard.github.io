<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Presence | Kieran Maynard</title>
  <meta name="description" content="Real-time Roblox online presence tracker for amenomori2 and amenomori1668 — live polling via the Roblox Presence API.">
  <meta property="og:title" content="Roblox Presence Tracker">
  <meta property="og:description" content="Real-time Roblox online presence for amenomori2 and amenomori1668.">
  <link rel="canonical" href="https://krm.fyi/roblox-presence.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) {
          t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <style>
    .presence-demo { max-width: 900px; margin: 3rem auto; }
    .presence-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .presence-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 24px var(--shadow-card);
      text-align: center;
    }
    .presence-card .avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 3px solid var(--border-soft);
      margin-bottom: 1rem;
    }
    .presence-card .username {
      font-size: 1.4rem; font-weight: 700; color: var(--text-strong); margin-bottom: 0.25rem;
    }
    .presence-card .display-name {
      font-size: 0.95rem; color: var(--text-muted); margin-bottom: 1.25rem;
    }
    .presence-card .status {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1.25rem; border-radius: 999px;
      font-size: 1rem; font-weight: 600;
    }
    .presence-card .status-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    }
    /* Presence states */
    .status--online  { background: #d4edda; color: #155724; }
    .status--online  .status-dot { background: #28a745; box-shadow: 0 0 6px #28a74588; }
    .status--ingame  { background: #cce5ff; color: #004085; }
    .status--ingame  .status-dot { background: #007bff; box-shadow: 0 0 6px #007bff88; }
    .status--studio  { background: #fff3cd; color: #856404; }
    .status--studio  .status-dot { background: #ffc107; box-shadow: 0 0 6px #ffc10788; }
    .status--offline { background: #f5f5f5; color: #666; }
    .status--offline .status-dot { background: #999; }
    [data-theme="dark"] .status--online  { background: #0d3320; color: #7eeaaa; }
    [data-theme="dark"] .status--ingame  { background: #0a2342; color: #80bdff; }
    [data-theme="dark"] .status--studio  { background: #332b10; color: #ffe69c; }
    [data-theme="dark"] .status--offline { background: #2a2f35; color: #999; }
    [data-theme="dark"] .status--offline .status-dot { background: #666; }
    .presence-card .game-info {
      margin-top: 1rem; font-size: 0.9rem; color: var(--text-subtle);
    }
    .presence-card .game-info a { color: var(--brand); text-decoration: none; }
    .presence-card .game-info a:hover { text-decoration: underline; }
    .presence-card .error-msg {
      color: #e74c3c; font-size: 0.85rem; margin-top: 0.5rem;
    }
    .presence-footer {
      text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-faint);
    }
    .presence-footer a { color: var(--brand); }
    .last-poll {
      text-align: center; margin-top: 1rem; font-size: 0.75rem; color: var(--text-faint);
    }
    /* Roblox profile link */
    .presence-card .profile-link {
      display: inline-block; margin-top: 0.5rem; font-size: 0.8rem; color: var(--brand); text-decoration: none;
    }
    .presence-card .profile-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-name">Kieran Maynard</a>
  </nav>

  <main class="container">
    <div class="presence-demo">
      <div class="presence-grid" id="presence-grid">
        <!-- Cards injected by JS -->
      </div>
      <div class="last-poll" id="last-poll"></div>
    </div>
    <div class="presence-footer">
      Polling the <a href="https://presence.roblox.com/docs" target="_blank" rel="noopener">Roblox Presence API</a> every 15 seconds.
    </div>
  </main>

  <script>
    (function () {
      // ── User config ─────────────────────────────────────
      const USERS = [
        { id: 9829738831,  username: 'amenomori2' },
        { id: 7874713562,  username: 'amenomori1668' },
      ];

      const POLL_MS = 15000;

      // ── Presence map ────────────────────────────────────
      const PRESENCE_MAP = {
        0: { label: 'Offline',   cls: 'status--offline' },
        1: { label: 'Online',    cls: 'status--online'  },
        2: { label: 'In Game',   cls: 'status--ingame'  },
        3: { label: 'In Studio', cls: 'status--studio'  },
      };

      // ── Build card DOM for each user ────────────────────
      const grid = document.getElementById('presence-grid');

      const cards = USERS.map(function (u) {
        var card = document.createElement('div');
        card.className = 'presence-card';
        card.id = 'card-' + u.id;
        card.innerHTML =
          '<img class="avatar" id="av-' + u.id + '" src="" alt="' + u.username + ' avatar" />' +
          '<div class="username">' + u.username + '</div>' +
          '<div class="display-name" id="dn-' + u.id + '">@' + u.username + '</div>' +
          '<div class="status status--offline" id="sb-' + u.id + '">' +
            '<span class="status-dot"></span>' +
            '<span id="st-' + u.id + '">Loading…</span>' +
          '</div>' +
          '<div class="game-info" id="gi-' + u.id + '"></div>' +
          '<a class="profile-link" href="https://www.roblox.com/users/' + u.id + '/profile" target="_blank" rel="noopener">View profile →</a>' +
          '<div class="error-msg" id="err-' + u.id + '" style="display:none"></div>';
        grid.appendChild(card);
        return u;
      });

      // ── Helper: get DOM refs for a user ─────────────────
      function refs(u) {
        return {
          avatar:     document.getElementById('av-' + u.id),
          displayName:document.getElementById('dn-' + u.id),
          statusBadge:document.getElementById('sb-' + u.id),
          statusText: document.getElementById('st-' + u.id),
          gameInfo:   document.getElementById('gi-' + u.id),
          errorMsg:   document.getElementById('err-' + u.id),
        };
      }

      // ── Update one card ─────────────────────────────────
      function updateCard(u, presence) {
        var r = refs(u);
        var info = PRESENCE_MAP[presence.userPresenceType] || PRESENCE_MAP[0];

        r.statusBadge.className = 'status ' + info.cls;
        r.statusText.textContent = info.label;

        if (presence.userPresenceType === 2 && presence.universeId) {
          r.gameInfo.innerHTML = 'Playing: <a href="https://www.roblox.com/games/' + presence.universeId +
            '" target="_blank" rel="noopener">View game →</a>';
        } else if (presence.userPresenceType === 1) {
          r.gameInfo.textContent = presence.lastLocation || 'Website';
        } else if (presence.userPresenceType === 3) {
          r.gameInfo.textContent = 'Roblox Studio';
        } else {
          r.gameInfo.textContent = '';
        }

        r.errorMsg.style.display = 'none';
      }

      // ── Fetch avatars (batched, once) ───────────────────
      var avatarsLoaded = false;
      async function loadAvatars() {
        if (avatarsLoaded) return;
        var ids = USERS.map(function (u) { return u.id; }).join(',');
        try {
          var res = await fetch('https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=' +
            ids + '&size=150x150&format=Png');
          if (!res.ok) return;
          var data = await res.json();
          (data.data || []).forEach(function (img) {
            var av = document.getElementById('av-' + img.targetId);
            if (av && img.imageUrl) { av.src = img.imageUrl; }
          });
          avatarsLoaded = true;
        } catch (_) {}
      }

      // ── Fetch display names (once per user) ─────────────
      var displayNamesLoaded = {};
      async function loadDisplayName(u) {
        if (displayNamesLoaded[u.id]) return;
        var r = refs(u);
        try {
          var res = await fetch('https://users.roblox.com/v1/users/' + u.id);
          if (!res.ok) return;
          var data = await res.json();
          if (data.displayName && data.displayName !== data.name) {
            r.displayName.textContent = data.displayName + ' (@' + data.name + ')';
          } else {
            r.displayName.textContent = '@' + data.name;
          }
          displayNamesLoaded[u.id] = true;
        } catch (_) {}
      }

      // ── Main poll ───────────────────────────────────────
      async function poll() {
        var ids = USERS.map(function (u) { return u.id; });
        try {
          var presRes = await fetch('https://presence.roblox.com/v1/presence/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userIds: ids }),
          });
          if (!presRes.ok) throw new Error('Presence API returned ' + presRes.status);
          var presData = await presRes.json();

          (presData.userPresences || []).forEach(function (p) {
            var u = USERS.find(function (x) { return x.id === p.userId; });
            if (u) updateCard(u, p);
          });

          loadAvatars();
          USERS.forEach(loadDisplayName);

        } catch (err) {
          USERS.forEach(function (u) {
            var r = refs(u);
            r.errorMsg.textContent = 'API error: ' + err.message;
            r.errorMsg.style.display = '';
          });
        }

        document.getElementById('last-poll').textContent =
          'Last checked: ' + new Date().toLocaleTimeString();
      }

      // ── Start ───────────────────────────────────────────
      poll();
      setInterval(poll, POLL_MS);
    })();
  </script>
</body>
</html>
