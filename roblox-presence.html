<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Presence | Kieran Maynard</title>
  <link rel="canonical" href="https://krm.fyi/roblox-presence.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <style>
    .presence-demo { max-width: 900px; margin: 3rem auto; }
    .presence-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .presence-card {
      background: var(--bg-elevated); border: 1px solid var(--border-card);
      border-radius: 12px; padding: 2rem; box-shadow: 0 4px 24px var(--shadow-card); text-align: center;
    }
    .presence-card .avatar { width: 96px; height: 96px; border-radius: 50%; border: 3px solid var(--border-soft); margin-bottom: 1rem; }
    .presence-card .username { font-size: 1.4rem; font-weight: 700; color: var(--text-strong); margin-bottom: 0.25rem; }
    .presence-card .display-name { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 1.25rem; }
    .presence-card .status {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1.25rem; border-radius: 999px; font-size: 1rem; font-weight: 600;
    }
    .presence-card .status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .status--online  { background: #d4edda; color: #155724; }
    .status--online  .status-dot { background: #28a745; box-shadow: 0 0 6px #28a74588; }
    .status--ingame  { background: #cce5ff; color: #004085; }
    .status--ingame  .status-dot { background: #007bff; box-shadow: 0 0 6px #007bff88; }
    .status--studio  { background: #fff3cd; color: #856404; }
    .status--studio  .status-dot { background: #ffc107; box-shadow: 0 0 6px #ffc10788; }
    .status--offline { background: #f5f5f5; color: #666; }
    .status--offline .status-dot { background: #999; }
    [data-theme="dark"] .status--online  { background: #0d3320; color: #7eeaaa; }
    [data-theme="dark"] .status--ingame  { background: #0a2342; color: #80bdff; }
    [data-theme="dark"] .status--studio  { background: #332b10; color: #ffe69c; }
    [data-theme="dark"] .status--offline { background: #2a2f35; color: #999; }
    [data-theme="dark"] .status--offline .status-dot { background: #666; }
    .presence-card .game-info { margin-top: 1rem; font-size: 0.9rem; color: var(--text-subtle); }
    .presence-card .game-info a { color: var(--brand); text-decoration: none; }
    .presence-card .game-info a:hover { text-decoration: underline; }
    .presence-card .profile-link { display: inline-block; margin-top: 0.5rem; font-size: 0.8rem; color: var(--brand); text-decoration: none; }
    .presence-card .profile-link:hover { text-decoration: underline; }
    .presence-card .error-msg { color: #e74c3c; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .presence-footer { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-faint); }
    .presence-footer a { color: var(--brand); }
    .last-poll { text-align: center; margin-top: 1rem; font-size: 0.75rem; color: var(--text-faint); }
  </style>
</head>
<body>
  <nav class="site-nav"><a href="/" class="nav-name">Kieran Maynard</a></nav>

  <main class="container">
    <div class="presence-demo">
      <div class="presence-grid" id="presence-grid"></div>
      <div class="last-poll" id="last-poll"></div>
    </div>
    <div class="presence-footer">
      Live from the <a href="https://presence.roblox.com/docs" target="_blank" rel="noopener">Roblox Presence API</a>.
    </div>
  </main>

  <script>
    (function () {
      var USERS = [
        { id: 9829738831, username: 'amenomori2' },
        { id: 7874713562, username: 'amenomori1668' },
      ];
      var USER_IDS = USERS.map(function (u) { return u.id; });
      var POLL_MS = 15000;

      var PRESENCE_MAP = {
        0: { label: 'Offline',   cls: 'status--offline' },
        1: { label: 'Online',    cls: 'status--online'  },
        2: { label: 'In Game',   cls: 'status--ingame'  },
        3: { label: 'In Studio', cls: 'status--studio'  },
      };

      var grid = document.getElementById('presence-grid');
      var lastPoll = document.getElementById('last-poll');

      // Build cards
      USERS.forEach(function (u) {
        var card = document.createElement('div');
        card.className = 'presence-card';
        card.id = 'card-' + u.id;
        card.innerHTML =
          '<img class="avatar" id="av-' + u.id + '" src="" alt="' + u.username + '" />' +
          '<div class="username">' + u.username + '</div>' +
          '<div class="display-name" id="dn-' + u.id + '">@' + u.username + '</div>' +
          '<div class="status status--offline" id="sb-' + u.id + '">' +
            '<span class="status-dot"></span>' +
            '<span id="st-' + u.id + '">Loading…</span>' +
          '</div>' +
          '<div class="game-info" id="gi-' + u.id + '"></div>' +
          '<a class="profile-link" href="https://www.roblox.com/users/' + u.id + '/profile" target="_blank" rel="noopener">View profile →</a>' +
          '<div class="error-msg" id="err-' + u.id + '"></div>';
        grid.appendChild(card);
      });

      function $id(s) { return document.getElementById(s); }

      function updateCard(u, presences, avatars, displayNames) {
        var p = presences[u.id];
        var info = PRESENCE_MAP[p ? p.userPresenceType : 0] || PRESENCE_MAP[0];
        $id('sb-' + u.id).className = 'status ' + info.cls;
        $id('st-' + u.id).textContent = info.label;

        if (p) {
          var gi = $id('gi-' + u.id);
          if (p.userPresenceType === 2 && p.universeId)
            gi.innerHTML = 'Playing: <a href="https://www.roblox.com/games/' + p.universeId + '" target="_blank" rel="noopener">View game →</a>';
          else if (p.userPresenceType === 1)
            gi.textContent = p.lastLocation || 'Website';
          else if (p.userPresenceType === 3)
            gi.textContent = 'Roblox Studio';
          else gi.textContent = '';
        }
        if (avatars && avatars[u.id]) $id('av-' + u.id).src = avatars[u.id];
        if (displayNames && displayNames[u.id]) $id('dn-' + u.id).textContent = displayNames[u.id];
        $id('err-' + u.id).style.display = 'none';
      }

      var avatarsFetched = false;
      var displayNamesFetched = false;

      async function poll() {
        try {

          // ── Presence: POST to Roblox API ──
          var presRes = await fetch('https://presence.roblox.com/v1/presence/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userIds: USER_IDS }),
          });
          if (!presRes.ok) throw new Error('Presence API HTTP ' + presRes.status);
          var presData = await presRes.json();
          var presences = {};
          (presData.userPresences || []).forEach(function (p) { presences[p.userId] = p; });

          // ── Avatars: GET (batched, once) ──
          if (!avatarsFetched) {
            var thumbRes = await fetch(
              'https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=' +
              USER_IDS.join(',') + '&size=150x150&format=Png'
            );
            if (thumbRes.ok) {
              var thumbData = await thumbRes.json();
              var avatars = {};
              (thumbData.data || []).forEach(function (img) { avatars[img.targetId] = img.imageUrl; });
              USERS.forEach(function (u) { updateCard(u, presences, avatars, null); });
              avatarsFetched = true;
            }
          }

          // ── Display names: GET (once per user) ──
          if (!displayNamesFetched) {
            var displayNames = {};
            for (var i = 0; i < USERS.length; i++) {
              try {
                var userRes = await fetch('https://users.roblox.com/v1/users/' + USERS[i].id);
                if (userRes.ok) {
                  var userData = await userRes.json();
                  displayNames[USERS[i].id] = userData.displayName && userData.displayName !== userData.name
                    ? userData.displayName + ' (@' + userData.name + ')'
                    : '@' + userData.name;
                }
              } catch (_) {}
            }
            if (Object.keys(displayNames).length) {
              displayNamesFetched = true;
              USERS.forEach(function (u) { updateCard(u, presences, null, displayNames); });
            }
          }

          // Update presence-only (after initial fetches)
          if (avatarsFetched && displayNamesFetched) {
            USERS.forEach(function (u) { updateCard(u, presences, null, null); });
          }

          lastPoll.textContent = 'Last checked: ' + new Date().toLocaleTimeString();

        } catch (err) {
          USERS.forEach(function (u) {
            var errEl = $id('err-' + u.id);
            errEl.textContent = 'API error: ' + err.message;
            errEl.style.display = '';
          });
          lastPoll.textContent = 'Last attempt: ' + new Date().toLocaleTimeString() + ' (failed)';
        }
      }

      poll();
      setInterval(poll, POLL_MS);
    })();
  </script>
</body>
</html>
