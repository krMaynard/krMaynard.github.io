<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Presence | Kieran Maynard</title>
  <meta name="description" content="Real-time Roblox presence for amenomori2 and amenomori1668.">
  <link rel="canonical" href="https://krm.fyi/roblox-presence.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script>(function(){try{var t=localStorage.getItem('theme');if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','light')}})()</script>
  <style>
    .presence-demo { max-width: 900px; margin: 3rem auto; }
    .presence-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
    .presence-card {
      background: var(--bg-elevated); border: 1px solid var(--border-card);
      border-radius: 12px; padding: 2rem 1.75rem; box-shadow: 0 4px 24px var(--shadow-card); text-align: center;
    }
    .presence-card .avatar { width: 96px; height: 96px; border-radius: 50%; border: 3px solid var(--border-soft); margin-bottom: 0.75rem; }
    .presence-card .username { font-size: 1.35rem; font-weight: 700; color: var(--text-strong); }
    .presence-card .handle { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .presence-card .bio { font-size: 0.85rem; color: var(--text-subtle); font-style: italic; margin-bottom: 0.75rem; min-height: 1.2em; }
    .presence-card .status {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 1.1rem; border-radius: 999px; font-size: 0.95rem; font-weight: 600;
    }
    .presence-card .status-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .status--online  { background: #d4edda; color: #155724; } .status--online  .status-dot { background: #28a745; box-shadow: 0 0 5px #28a74588; }
    .status--ingame  { background: #cce5ff; color: #004085; } .status--ingame  .status-dot { background: #007bff; box-shadow: 0 0 5px #007bff88; }
    .status--studio  { background: #fff3cd; color: #856404; } .status--studio  .status-dot { background: #ffc107; box-shadow: 0 0 5px #ffc10788; }
    .status--offline { background: #f5f5f5; color: #666;    } .status--offline .status-dot { background: #999; }
    [data-theme="dark"] .status--online  { background: #0d3320; color: #7eeaaa; }
    [data-theme="dark"] .status--ingame  { background: #0a2342; color: #80bdff; }
    [data-theme="dark"] .status--studio  { background: #332b10; color: #ffe69c; }
    [data-theme="dark"] .status--offline { background: #2a2f35; color: #999; }
    [data-theme="dark"] .status--offline .status-dot { background: #666; }
    .presence-card .game-info { margin-top: 0.6rem; font-size: 0.85rem; color: var(--text-subtle); }
    .presence-card .game-info a { color: var(--brand); text-decoration: none; }
    .presence-card .game-info a:hover { text-decoration: underline; }
    .presence-card .stats {
      display: flex; justify-content: center; gap: 1.25rem; margin-top: 0.75rem;
      font-size: 0.8rem; color: var(--text-muted);
    }
    .presence-card .stats span { white-space: nowrap; }
    .presence-card .stats strong { color: var(--text-strong); }
    .presence-card .profile-link {
      display: inline-block; margin-top: 0.5rem; font-size: 0.8rem; color: var(--brand); text-decoration: none;
    }
    .presence-card .profile-link:hover { text-decoration: underline; }
    .presence-card .error-msg { color: #e74c3c; font-size: 0.8rem; margin-top: 0.5rem; display: none; }
    .presence-footer { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-faint); }
    .presence-footer a { color: var(--brand); }
    .freshness { text-align: center; margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-faint); }
    .freshness .stale { color: #e67e22; }
  </style>
</head>
<body>
  <nav class="site-nav"><a href="/" class="nav-name">Kieran Maynard</a></nav>
  <main class="container">
    <div class="presence-demo">
      <div class="presence-grid" id="grid"></div>
      <div class="freshness" id="freshness"></div>
    </div>
    <div class="presence-footer">
      Data from <a href="https://presence.roblox.com/docs" target="_blank" rel="noopener">Roblox APIs</a> · refreshed every 60s
    </div>
  </main>

  <script>
    (function () {
      var PMAP = {
        0: { label: 'Offline',   cls: 'status--offline' },
        1: { label: 'Online',    cls: 'status--online'  },
        2: { label: 'In Game',   cls: 'status--ingame'  },
        3: { label: 'In Studio', cls: 'status--studio'  },
      };

      var grid = document.getElementById('grid');
      var freshness = document.getElementById('freshness');

      function buildCard(u) {
        var c = document.createElement('div');
        c.className = 'presence-card'; c.id = 'card-' + u.id;
        c.innerHTML =
          '<img class="avatar" id="av-' + u.id + '" src="" alt="' + u.username + '" />' +
          '<div class="username">' + u.username + '</div>' +
          '<div class="handle" id="hn-' + u.id + '">@' + u.username + '</div>' +
          '<div class="bio" id="bio-' + u.id + '"></div>' +
          '<div class="status status--offline" id="sb-' + u.id + '"><span class="status-dot"></span><span id="st-' + u.id + '">…</span></div>' +
          '<div class="game-info" id="gi-' + u.id + '"></div>' +
          '<div class="stats" id="stats-' + u.id + '"></div>' +
          '<a class="profile-link" href="https://www.roblox.com/users/' + u.id + '/profile" target="_blank" rel="noopener">View profile →</a>' +
          '<div class="error-msg" id="err-' + u.id + '"></div>';
        return c;
      }

      function ageStr(days) {
        if (days == null) return '';
        if (days < 30) return days + 'd';
        if (days < 365) return Math.floor(days / 30) + 'mo';
        var y = Math.floor(days / 365);
        var m = Math.floor((days % 365) / 30);
        return y + 'y' + (m ? ' ' + m + 'mo' : '');
      }

      function updateCard(u, presences, avatars, profiles) {
        var p = presences[u.id];
        var info = PMAP[p ? p.type : 0] || PMAP[0];
        document.getElementById('sb-' + u.id).className = 'status ' + info.cls;
        document.getElementById('st-' + u.id).textContent = info.label;

        if (p) {
          var gi = document.getElementById('gi-' + u.id);
          if (p.type === 2 && p.universeId)
            gi.innerHTML = '<a href="https://www.roblox.com/games/' + p.universeId + '" target="_blank" rel="noopener">View game →</a>';
          else if (p.type === 1)
            gi.textContent = p.lastLocation || 'Website';
          else if (p.type === 3)
            gi.textContent = 'Roblox Studio';
          else gi.textContent = '';
        }

        if (avatars && avatars[u.id])
          document.getElementById('av-' + u.id).src = avatars[u.id];

        var prof = profiles && profiles[u.id];
        if (prof) {
          document.getElementById('bio-' + u.id).textContent = prof.description || '';
          var stats = [];
          if (prof.friends != null) stats.push('<span><strong>' + prof.friends + '</strong> friends</span>');
          if (prof.followers != null) stats.push('<span><strong>' + prof.followers + '</strong> followers</span>');
          var age = ageStr(prof.ageDays);
          if (age) stats.push('<span>joined <strong>' + age + '</strong> ago</span>');
          document.getElementById('stats-' + u.id).innerHTML = stats.join(' · ');
        }
      }

      function updateFreshness(updatedAt, err) {
        if (err) { freshness.innerHTML = '<span class="stale">⚠ ' + err + '</span>'; return; }
        if (!updatedAt) { freshness.textContent = ''; return; }
        var secs = Math.floor((Date.now() - new Date(updatedAt).getTime()) / 1000);
        var age = secs < 60 ? secs + 's' : secs < 3600 ? Math.floor(secs / 60) + 'm' : Math.floor(secs / 3600) + 'h';
        freshness.innerHTML = 'Updated <span class="' + (secs > 300 ? 'stale' : '') + '">' + age + ' ago</span>';
      }

      async function load() {
        try {
          var res = await fetch('/data/roblox-presence.json?t=' + Date.now());
          if (!res.ok) throw new Error('HTTP ' + res.status);
          var data = await res.json();
          if (!grid.children.length)
            (data.users || []).forEach(function (u) { grid.appendChild(buildCard(u)); });
          (data.users || []).forEach(function (u) {
            updateCard(u, data.presences || {}, data.avatars || {}, data.profiles || {});
          });
          updateFreshness(data.updatedAt, null);
        } catch (err) {
          updateFreshness(null, 'Failed to load');
          if (!grid.children.length)
            grid.innerHTML = '<div class="presence-card"><p style="color:var(--text-muted)">Loading…</p></div>';
        }
      }

      load();
      setInterval(load, 15000);
    })();
  </script>
</body>
</html>
